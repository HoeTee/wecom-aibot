id: pdf_3papers_create_summary_doc
goal: 将当前知识库中的三篇固定论文总结成一份新的企业微信文档。
prompt_version: assistant_v1
assets:
  - knowledge_base/papers/2505.12540v4.pdf
  - knowledge_base/papers/2506.00054v1.pdf
  - knowledge_base/papers/2603.03329v1.pdf
turns:
  - turns/turn_1.txt
global_gates:
  - must_bind_doc_triple
  - must_not_claim_success_on_failure
  - must_follow_requested_structure
scenario_gates:
  - id: fresh_regenerate_must_not_reuse_existing_doc
    description: 当用户明确要求“重新生成一份企业微信文档”时，本轮写入不能直接通过 edit_doc_content 复用旧文档，必须先创建新文档。
  - id: generated_doc_must_not_contain_placeholders
    description: 写入文档的正文不能包含 `...` 这类占位符。
  - id: generated_doc_must_include_required_sections
    description: 写入文档的正文必须真实包含背景、每篇论文摘要、横向对比、结论与建议四个部分。
  - id: generated_doc_must_not_add_unrequested_table
    description: 当前场景没有要求 comparison table，因此首轮写入不能提前出现第 5 节表格或技术对比表。
artifact_focus:
  - original_user_request
  - assistant_reply
  - tool_trace
  - rewritten_query
  - written_doc_content
  - final_doc_binding
